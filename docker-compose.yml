services:
  db:
    image: postgres:16-alpine
    container_name: blackpolar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: blackpolar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: blackpolar
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Solo accesible desde el propio host (127.0.0.1) — nunca expuesta a
    # internet. Si necesitas conectarte desde tu máquina, usa un túnel SSH.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackpolar"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: blackpolar-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://blackpolar:${POSTGRES_PASSWORD}@db:5432/blackpolar
    depends_on:
      db:
        condition: service_healthy
    # Nginx en el host hace proxy_pass a 127.0.0.1:4000 — igual que antes.
    ports:
      - "127.0.0.1:4000:4000"

volumes:
  pgdata:
